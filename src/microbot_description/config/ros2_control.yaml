/**/controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

/**/diff_drive_controller:
  ros__parameters:
    type: diff_drive_controller/DiffDriveController

    left_wheel_names:
      - left_front_wheel_joint
      - left_rear_wheel_joint
    right_wheel_names:
      - right_front_wheel_joint
      - right_rear_wheel_joint

    wheel_separation: 0.110
    wheel_radius: 0.0285

    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    publish_rate: 50.0

    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    position_feedback: true
    open_loop: false

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.35
    linear.x.min_velocity: -0.35
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration: 0.8
    linear.x.min_acceleration: -0.8

    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 2.5
    angular.z.min_velocity: -2.5
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 5.0
    angular.z.min_acceleration: -5.0
